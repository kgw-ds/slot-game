<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUMAN FRUIT SLOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --bg-color: #1a0b2e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #2a114f 0%, #1a0b2e 100%);
            color: white;
            font-family: 'Jua', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            /* 16:9 비율 유지 및 중앙 정렬 */
            aspect-ratio: 16 / 9;
            max-width: 100vw;
            margin: 0 auto;
        }

        /* 상단 상태 바 */
        #status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            color: #fff;
            text-shadow: 0 0 5px #fff;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        /* 메인 타이틀 (네온사인 효과) */
        .title {
            font-size: 6rem;
            margin: 0;
            text-align: center;
            color: #fff;
            text-shadow: 
                0 0 5px #fff, 
                0 0 10px #fff, 
                0 0 20px var(--neon-pink), 
                0 0 40px var(--neon-pink), 
                0 0 80px var(--neon-pink);
            animation: pulsate 1.5s infinite alternate;
        }

        .subtitle {
            font-size: 2.5rem;
            margin-top: 10px;
            margin-bottom: 40px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        @keyframes pulsate {
            100% { text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-pink), 0 0 40px var(--neon-pink); }
            0% { text-shadow: 0 0 2px #fff, 0 0 4px #fff, 0 0 6px var(--neon-pink), 0 0 10px var(--neon-pink); }
        }

        /* 슬롯 프레임 (유리 패널 느낌) */
        .slot-container {
            background: rgba(255, 255, 255, 0.05);
            border: 4px solid var(--neon-blue);
            border-radius: 30px;
            box-shadow: 0 0 20px var(--neon-blue), inset 0 0 20px var(--neon-blue);
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
            margin-bottom: 50px;
        }

        .slot {
            /* === 과일 크기 및 프레임 크기 확대 (적용됨) === */
            font-size: 25rem; 
            line-height: 1;
            width: 500px; 
            height: 500px; 
            background: #fff;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .blur-effect {
            filter: blur(5px);
            transform: scaleY(1.2);
        }

        /* 3D 아케이드 시작 버튼 */
        .start-btn {
            background-color: #ff3366;
            color: white;
            font-family: 'Jua', sans-serif;
            font-size: 5rem; 
            padding: 25px 100px; 
            border: none;
            border-radius: 60px; 
            cursor: pointer;
            box-shadow: 0 15px 0 #990033, 0 20px 20px rgba(0,0,0,0.5);
            transition: all 0.1s ease;
            text-transform: uppercase;
        }

        .start-btn:active, .start-btn.pressed {
            box-shadow: 0 5px 0 #990033, 0 10px 10px rgba(0,0,0,0.5);
            transform: translateY(10px);
        }

        .start-btn:disabled {
            background-color: #888;
            box-shadow: 0 15px 0 #555, 0 20px 20px rgba(0,0,0,0.5);
            cursor: not-allowed;
        }

        /* 진동 애니메이션 (결과 나올 때) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-animation {
            animation: shake 0.5s;
            animation-iteration-count: 1;
        }
    </style>
</head>
<body>

    <div id="status-bar">📡 방: <span id="room-name">알 수 없음</span> | 상태: <span id="connection-status">연결 대기 중... 🟡</span></div>

    <h1 class="title">HUMAN FRUIT SLOT</h1>
    <div class="subtitle">사람 슬롯과 함께 돌아가는 과일 슬롯머신!</div>

    <div class="slot-container">
        <div class="slot" id="slot-fruit">❓</div>
    </div>

    <button class="start-btn" id="start-btn">START!</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 입력해주신 Firebase 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyBN9D_2fzQe2rFpoWqhzHmtFZxcCKaUhok",
            authDomain: "slot-ee50a.firebaseapp.com",
            projectId: "slot-ee50a",
            storageBucket: "slot-ee50a.firebasestorage.app",
            messagingSenderId: "676721791908",
            appId: "1:676721791908:web:9964fd3646e60abe766731",
            measurementId: "G-4K8HW92DFE"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // UI 요소 가져오기
        const slotFruit = document.getElementById('slot-fruit');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('connection-status');
        const roomNameText = document.getElementById('room-name');

        // URL 파라미터에서 방 이름 가져오기 (기본값: festival1)
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'festival1';
        roomNameText.innerText = roomId;

        const fruits = ['🍎', '🍇', '🍌'];
        let isSpinning = false;
        let lastTriggerTime = 0;

        // DB 참조 경로 설정 (방 이름 기준)
        const spinRef = ref(db, `rooms/${roomId}/spinTrigger`);
        const connectedRef = ref(db, ".info/connected");

        // 연결 상태 감지
        onValue(connectedRef, (snap) => {
            if (snap.val() === true) {
                statusText.innerText = "연결됨 🟢";
            } else {
                statusText.innerText = "연결 끊김 🔴";
            }
        });

        // 🌟 수정된 부분 1: 스핀 이벤트 감지 및 네트워크 지연 보정
        onValue(spinRef, (snapshot) => {
            const triggerTime = snapshot.val();
            
            // 새로운 스핀 이벤트가 발생했고, 현재 돌고 있지 않다면
            if (triggerTime && triggerTime > lastTriggerTime) {
                lastTriggerTime = triggerTime;

                // 서버를 거쳐 오느라 늦은 시간(네트워크 지연) 계산
                let delay = Date.now() - triggerTime;
                
                // 만약 기기 간 시계가 안 맞아서 음수가 나오거나 렉이 심하면 예외 처리
                if (delay < 0 || delay > 2000) delay = 0; 
                
                // 원래 스핀 시간(2500ms)에서 지연된 시간만큼 빼서 멈추는 타이밍을 강제로 맞춤
                const targetDuration = 2500 - delay;

                startSpinning(targetDuration);
            }
        });

        // 시작 버튼 클릭 이벤트
        startBtn.addEventListener('click', () => {
            if (isSpinning) return;
            
            // 버튼 눌림 효과 추가
            startBtn.classList.add('pressed');
            setTimeout(() => startBtn.classList.remove('pressed'), 200);

            // DB에 현재 시간을 기록하여 모든 클라이언트(화면)에 스핀 명령 전송
            set(spinRef, Date.now()).catch((error) => {
                console.error("Firebase 에러: ", error);
                alert("서버 연결에 문제가 있습니다.");
            });
        });

        // 🌟 수정된 부분 2: 보정된 시간(duration)을 전달받아 애니메이션 실행
        function startSpinning(duration) {
            isSpinning = true;
            startBtn.disabled = true;
            statusText.innerText = "돌아가는 중... 🌀";
            slotFruit.classList.add('blur-effect');

            let spinCount = 0;
            // 0.05초마다 과일 변경 (빠르게 돌아가는 효과)
            const spinInterval = setInterval(() => {
                slotFruit.innerText = fruits[spinCount % 3];
                spinCount++;
            }, 50);

            // 고정된 2.5초가 아니라, 지연 보정된 시간(duration) 뒤에 멈춤!
            setTimeout(() => {
                clearInterval(spinInterval);
                slotFruit.classList.remove('blur-effect');
                
                // === 독립적인 랜덤 확률 도출 (1/3 확률) ===
                const randomResult = fruits[Math.floor(Math.random() * 3)];
                slotFruit.innerText = randomResult;

                // 결과 이펙트
                slotFruit.classList.add('shake-animation');
                setTimeout(() => slotFruit.classList.remove('shake-animation'), 500);
                fireConfetti();

                isSpinning = false;
                startBtn.disabled = false;
                statusText.innerText = "연결됨 🟢";
            }, duration); 
        }

        // 축하 폭죽 효과 (Confetti)
        function fireConfetti() {
            var duration = 2000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff00ff', '#00ffff', '#ffffff']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff00ff', '#00ffff', '#ffffff']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
