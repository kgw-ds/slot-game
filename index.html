<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUMAN FRUIT SLOT</title>
    <!-- 강렬하고 굵은 느낌의 'Black Han Sans' 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <!-- Confetti (꽃가루) 효과 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-yellow: #ffff00;
        }

        body {
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(15, 5, 24, 0.85), rgba(15, 5, 24, 0.85)), url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=2070');
            background-size: cover;
            background-position: center;
            color: white;
            font-family: 'Black Han Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            max-width: 100vw;
            margin: 0 auto;
        }

        /* 상태 바 (맨 아래 배치) */
        #status-bar {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            font-size: 1.5rem;
            color: var(--neon-yellow);
            text-shadow: 0 0 5px var(--neon-yellow);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid var(--neon-yellow);
            letter-spacing: 2px;
        }

        /* 🌟 우측 상단 설정 버튼 */
        #settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.3s ease;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
        }
        #settings-btn:hover { transform: rotate(90deg) scale(1.1); }

        /* 🌟 설정창 모달 UI */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1a0b2e;
            border: 4px solid var(--neon-blue);
            border-radius: 20px;
            padding: 40px;
            width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 40px var(--neon-blue);
        }
        .modal-content h2 { margin: 0 0 10px 0; color: var(--neon-pink); text-align: center; font-size: 3rem; text-shadow: 0 0 10px var(--neon-pink); }
        .setting-group { display: flex; flex-direction: column; gap: 8px; }
        .setting-group label { font-size: 1.5rem; color: var(--neon-yellow); }
        .setting-group input[type="text"], .setting-group input[type="number"] {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.5rem;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #fff;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
        }
        .setting-checkbox { flex-direction: row; align-items: center; gap: 15px; cursor: pointer; }
        .setting-checkbox input { width: 30px; height: 30px; cursor: pointer; }
        
        .save-btn {
            background-color: var(--neon-blue);
            color: #000;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2.5rem;
            padding: 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.1s;
        }
        .save-btn:active { transform: scale(0.95); }
        .hidden { display: none !important; }

        /* 메인 타이틀 */
        .title {
            font-size: 6.5rem;
            margin: 0;
            text-align: center;
            color: #fff;
            letter-spacing: 5px;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink), 0 0 80px var(--neon-pink);
            animation: pulsate 1s infinite alternate;
        }

        .subtitle {
            font-size: 2.5rem;
            margin-top: 10px;
            margin-bottom: 30px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            letter-spacing: 2px;
        }

        @keyframes pulsate {
            100% { text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-pink), 0 0 40px var(--neon-pink); }
            0% { text-shadow: 0 0 2px #fff, 0 0 4px #fff, 0 0 6px var(--neon-pink), 0 0 10px var(--neon-pink); }
        }

        .slot-container {
            background: rgba(0, 0, 0, 0.8);
            border: 8px solid var(--neon-blue);
            border-radius: 20px;
            box-shadow: 0 0 30px var(--neon-blue), inset 0 0 30px var(--neon-blue);
            padding: 20px;
            margin-bottom: 40px;
        }

        .slot-window {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #ffffff 0%, #dddddd 100%);
            border-radius: 10px;
            overflow: hidden; 
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
        }

        .slot-reel {
            display: flex; flex-direction: column; width: 100%;
        }

        .slot-item {
            width: 500px; height: 500px;
            display: flex; justify-content: center; align-items: center;
            font-size: 25rem; line-height: 1; flex-shrink: 0;
        }

        .start-btn {
            background-color: var(--neon-pink);
            color: white; font-family: 'Black Han Sans', sans-serif;
            font-size: 5rem; padding: 20px 100px;
            border: none; border-radius: 15px; cursor: pointer;
            box-shadow: 0 15px 0 #990066, 0 20px 20px rgba(0,0,0,0.8);
            transition: all 0.1s ease; text-transform: uppercase;
            letter-spacing: 5px; text-shadow: 2px 2px 0px #000;
        }

        .start-btn:active, .start-btn.pressed {
            box-shadow: 0 5px 0 #990066, 0 10px 10px rgba(0,0,0,0.8);
            transform: translateY(10px);
        }
        .start-btn:disabled {
            background-color: #555; color: #888;
            box-shadow: 0 15px 0 #222, 0 20px 20px rgba(0,0,0,0.8);
            cursor: not-allowed; text-shadow: none;
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(2deg); }
            40% { transform: translate(3px, -2px) rotate(-1deg); }
            60% { transform: translate(-3px, 2px) rotate(0deg); }
            80% { transform: translate(3px, 2px) rotate(2deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <audio id="sound-spin" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>

    <div id="status-bar">📡 방: <span id="room-name">알 수 없음</span> | 상태: <span id="connection-status">연결 대기 중... 🟡</span></div>
    
    <!-- 🌟 우측 상단 설정 아이콘 -->
    <div id="settings-btn" title="게임 설정">⚙️</div>

    <!-- 🌟 설정 모달창 -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>게임 설정</h2>
            <div class="setting-group">
                <label>메인 제목</label>
                <input type="text" id="input-title" value="HUMAN FRUIT SLOT">
            </div>
            <div class="setting-group">
                <label>부제목</label>
                <input type="text" id="input-subtitle" value="사람 슬롯과 함께 돌아가는 과일 슬롯머신!">
            </div>
            <div class="setting-group">
                <label>돌아가는 시간 (초)</label>
                <input type="number" id="input-duration" value="4.5" step="0.5" min="1" max="15">
            </div>
            <label class="setting-group setting-checkbox">
                <input type="checkbox" id="input-sound" checked>
                <span>효과음 켜기 (이 기기만 적용)</span>
            </label>
            <button class="save-btn" id="save-btn">저장 및 닫기</button>
        </div>
    </div>

    <!-- 텍스트를 JS로 쉽게 바꾸기 위해 id 추가 -->
    <h1 class="title" id="main-title">HUMAN FRUIT SLOT</h1>
    <div class="subtitle" id="sub-title">사람 슬롯과 함께 돌아가는 과일 슬롯머신!</div>

    <div class="slot-container">
        <div class="slot-window">
            <div class="slot-reel" id="slot-reel">
                <div class="slot-item">❓</div>
            </div>
        </div>
    </div>

    <button class="start-btn" id="start-btn">START!</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBN9D_2fzQe2rFpoWqhzHmtFZxcCKaUhok",
            authDomain: "slot-ee50a.firebaseapp.com",
            projectId: "slot-ee50a",
            storageBucket: "slot-ee50a.firebasestorage.app",
            messagingSenderId: "676721791908",
            appId: "1:676721791908:web:9964fd3646e60abe766731",
            measurementId: "G-4K8HW92DFE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // UI 요소 가져오기
        const slotReel = document.getElementById('slot-reel');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('connection-status');
        const roomNameText = document.getElementById('room-name');
        
        const mainTitle = document.getElementById('main-title');
        const subTitle = document.getElementById('sub-title');
        const soundSpin = document.getElementById('sound-spin');
        const soundWin = document.getElementById('sound-win');

        // 설정 모달 요소 가져오기
        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const saveBtn = document.getElementById('save-btn');
        const inputTitle = document.getElementById('input-title');
        const inputSubtitle = document.getElementById('input-subtitle');
        const inputDuration = document.getElementById('input-duration');
        const inputSound = document.getElementById('input-sound');

        // 게임 상태 변수
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'festival1';
        roomNameText.innerText = roomId;

        const fruits = ['🍎', '🍇', '🍌'];
        let isSpinning = false;
        let lastTriggerTime = 0;
        
        // 🌟 기본 설정값 변수
        let currentDuration = 4500; // 기본 4.5초
        let soundEnabled = true;    // 기본 소리 켜짐

        const spinRef = ref(db, `rooms/${roomId}/spinTrigger`);
        const settingsRef = ref(db, `rooms/${roomId}/settings`);
        const connectedRef = ref(db, ".info/connected");

        // 연결 상태 감지
        onValue(connectedRef, (snap) => {
            statusText.innerText = snap.val() === true ? "연결됨 🟢" : "연결 끊김 🔴";
        });

        // 🌟 설정창 열고 닫기 로직
        settingsBtn.addEventListener('click', () => {
            settingsModal.classList.remove('hidden');
        });

        saveBtn.addEventListener('click', () => {
            // 로컬 소리 설정 업데이트
            soundEnabled = inputSound.checked;

            // 텍스트 및 시간 설정은 Firebase를 통해 동기화되도록 저장
            const newSettings = {
                title: inputTitle.value,
                subtitle: inputSubtitle.value,
                duration: parseFloat(inputDuration.value) * 1000 // 초를 밀리초로 변환
            };
            set(settingsRef, newSettings);

            settingsModal.classList.add('hidden');
        });

        // 🌟 Firebase에서 설정값 실시간 동기화 받기
        onValue(settingsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // 제목 반영
                if (data.title !== undefined) {
                    mainTitle.innerText = data.title;
                    inputTitle.value = data.title; // 설정창 안의 텍스트도 업데이트
                }
                // 부제목 반영
                if (data.subtitle !== undefined) {
                    subTitle.innerText = data.subtitle;
                    inputSubtitle.value = data.subtitle;
                }
                // 스핀 시간 반영
                if (data.duration !== undefined) {
                    currentDuration = data.duration;
                    inputDuration.value = data.duration / 1000;
                }
            }
        });

        // 스핀 이벤트 감지
        onValue(spinRef, (snapshot) => {
            const triggerTime = snapshot.val();
            if (triggerTime && triggerTime > lastTriggerTime) {
                lastTriggerTime = triggerTime;

                let delay = Date.now() - triggerTime;
                if (delay < 0 || delay > 2000) delay = 0; 
                
                // 설정된 시간에 맞춰 딜레이를 뺀 최종 실행 시간 계산
                let targetDuration = currentDuration - delay;
                if (targetDuration < 1000) targetDuration = 1000; // 최소 1초 보장

                startSpinning(targetDuration);
            }
        });

        // 버튼 클릭
        startBtn.addEventListener('click', () => {
            if (isSpinning) return;
            startBtn.classList.add('pressed');
            setTimeout(() => startBtn.classList.remove('pressed'), 200);
            set(spinRef, Date.now()).catch(console.error);
        });

        // 애니메이션 실행 함수
        function startSpinning(duration) {
            isSpinning = true;
            startBtn.disabled = true;
            statusText.innerText = "돌아가는 중... 🌀";

            // 🌟 소리가 켜져 있을 때만 재생
            if (soundEnabled) {
                soundSpin.currentTime = 0;
                soundSpin.play().catch(e => console.log("자동재생 방지됨"));
            }

            slotReel.innerHTML = '';
            
            // 시간에 비례해서 과일 개수를 늘려 회전 속도 유지
            const baseItemsPerSecond = 10; 
            const totalItems = Math.floor((duration / 1000) * baseItemsPerSecond);

            for(let i=0; i < totalItems - 1; i++) {
                const div = document.createElement('div');
                div.className = 'slot-item';
                div.innerText = fruits[Math.floor(Math.random() * 3)];
                slotReel.appendChild(div);
            }

            const randomResult = fruits[Math.floor(Math.random() * 3)];
            const targetDiv = document.createElement('div');
            targetDiv.className = 'slot-item';
            targetDiv.innerText = randomResult;
            slotReel.appendChild(targetDiv);

            const itemHeight = 500; 
            const finalY = -(totalItems - 1) * itemHeight;

            const animation = slotReel.animate([
                { transform: 'translateY(0px)' },
                { transform: `translateY(${finalY}px)` }
            ], {
                duration: duration,
                easing: 'cubic-bezier(0.1, 0.9, 0.2, 1.0)', 
                fill: 'forwards'
            });

            animation.onfinish = () => {
                // 🌟 소리가 켜져 있을 때만 폭죽 소리 재생
                if (soundEnabled) {
                    soundWin.currentTime = 0;
                    soundWin.play().catch(e => console.log("자동재생 방지됨"));
                }
                
                fireConfetti();
                slotReel.parentElement.classList.add('shake-animation');
                setTimeout(() => slotReel.parentElement.classList.remove('shake-animation'), 400);

                isSpinning = false;
                startBtn.disabled = false;
                statusText.innerText = "연결됨 🟢";
            };
        }

        // 축하 폭죽 효과
        function fireConfetti() {
            var duration = 2000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff00ff', '#00ffff', '#ffff00'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff00ff', '#00ffff', '#ffff00'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
