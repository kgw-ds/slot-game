<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUMAN FRUIT SLOT</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-yellow: #ffff00;
        }

        body {
            margin: 0;
            padding: 0;
            background-image: linear-gradient(rgba(15, 5, 24, 0.85), rgba(15, 5, 24, 0.85)), url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=2070');
            background-size: cover;
            background-position: center;
            color: white;
            font-family: 'Black Han Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            max-width: 100vw;
            margin: 0 auto;
        }

        #status-bar {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 10;
            font-size: 0.8rem;
            color: var(--neon-yellow);
            text-shadow: 0 0 3px var(--neon-yellow);
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
            border: 1px solid var(--neon-yellow);
            letter-spacing: 1px;
        }

        #settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 2.5rem;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.3s ease;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
        }
        #settings-btn:hover { transform: rotate(90deg) scale(1.1); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #1a0b2e;
            border: 4px solid var(--neon-blue);
            border-radius: 20px;
            padding: 40px;
            width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 40px var(--neon-blue);
        }
        .modal-content h2 { margin: 0 0 10px 0; color: var(--neon-pink); text-align: center; font-size: 3rem; text-shadow: 0 0 10px var(--neon-pink); }
        .setting-group { display: flex; flex-direction: column; gap: 8px; }
        .setting-group label { font-size: 1.5rem; color: var(--neon-yellow); }
        .setting-group input[type="text"], .setting-group input[type="number"] {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.5rem;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #fff;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
        }
        .setting-checkbox { flex-direction: row; align-items: center; gap: 15px; cursor: pointer; }
        .setting-checkbox input { width: 30px; height: 30px; cursor: pointer; }
        
        .save-btn {
            background-color: var(--neon-blue);
            color: #000;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2.5rem;
            padding: 15px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.1s;
        }
        .save-btn:active { transform: scale(0.95); }
        .hidden { display: none !important; }

        .title {
            font-size: 6.5rem;
            margin: 0;
            text-align: center;
            color: #fff;
            letter-spacing: 5px;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--neon-pink), 0 0 40px var(--neon-pink), 0 0 80px var(--neon-pink);
            animation: pulsate 1s infinite alternate;
        }

        .subtitle {
            font-size: 2.5rem;
            margin-top: 10px;
            margin-bottom: 30px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            letter-spacing: 2px;
        }

        @keyframes pulsate {
            100% { text-shadow: 0 0 4px #fff, 0 0 11px #fff, 0 0 19px var(--neon-pink), 0 0 40px var(--neon-pink); }
            0% { text-shadow: 0 0 2px #fff, 0 0 4px #fff, 0 0 6px var(--neon-pink), 0 0 10px var(--neon-pink); }
        }

        .slot-container {
            background: rgba(0, 0, 0, 0.8);
            border: 8px solid var(--neon-blue);
            border-radius: 20px;
            box-shadow: 0 0 30px var(--neon-blue), inset 0 0 30px var(--neon-blue);
            padding: 20px;
            margin-bottom: 40px;
        }

        .slot-window {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #ffffff 0%, #dddddd 100%);
            border-radius: 10px;
            overflow: hidden; 
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.6);
            will-change: transform; /* GPU 가속 최적화 */
        }

        .slot-reel {
            display: flex; flex-direction: column; width: 100%;
            will-change: transform; /* GPU 가속 최적화 */
        }

        .slot-item {
            width: 500px; height: 500px;
            display: flex; justify-content: center; align-items: center;
            font-size: 25rem; line-height: 1; flex-shrink: 0;
            will-change: transform;
        }

        .start-btn {
            background-color: var(--neon-pink);
            color: white; font-family: 'Black Han Sans', sans-serif;
            font-size: 5rem; padding: 20px 100px;
            border: none; border-radius: 15px; cursor: pointer;
            box-shadow: 0 15px 0 #990066, 0 20px 20px rgba(0,0,0,0.8);
            transition: all 0.1s ease; text-transform: uppercase;
            letter-spacing: 5px; text-shadow: 2px 2px 0px #000;
        }

        .start-btn:active, .start-btn.pressed {
            box-shadow: 0 5px 0 #990066, 0 10px 10px rgba(0,0,0,0.8);
            transform: translateY(10px);
        }
        .start-btn:disabled {
            background-color: #555; color: #888;
            box-shadow: 0 15px 0 #222, 0 20px 20px rgba(0,0,0,0.8);
            cursor: not-allowed; text-shadow: none;
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(2deg); }
            40% { transform: translate(3px, -2px) rotate(-1deg); }
            60% { transform: translate(-3px, 2px) rotate(0deg); }
            80% { transform: translate(3px, 2px) rotate(2deg); }
            100% { transform: translate(0px, 0px) rotate(0deg); }
        }
        .shake-animation { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <audio id="sound-spin" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>
    <audio id="sound-win" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>

    <div id="status-bar">📡 방: <span id="room-name">알 수 없음</span> | 상태: <span id="connection-status">대기중🟡</span></div>
    
    <div id="settings-btn" title="게임 설정">⚙️</div>

    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>게임 설정</h2>
            <div class="setting-group">
                <label>메인 제목</label>
                <input type="text" id="input-title" value="HUMAN FRUIT SLOT">
            </div>
            <div class="setting-group">
                <label>부제목</label>
                <input type="text" id="input-subtitle" value="사람 슬롯과 함께 돌아가는 과일 슬롯머신!">
            </div>
            <div class="setting-group">
                <label>돌아가는 시간 (초)</label>
                <input type="number" id="input-duration" value="4.5" step="0.5" min="1" max="15">
            </div>
            <div class="setting-group">
                <label>두 화면 일치 확률 (%, 기본 60%)</label>
                <input type="number" id="input-winrate" value="60" step="5" min="34" max="100">
            </div>
            <label class="setting-group setting-checkbox">
                <input type="checkbox" id="input-sound" checked>
                <span>효과음 켜기 (이 기기만 적용)</span>
            </label>
            <button class="save-btn" id="save-btn">저장 및 닫기</button>
        </div>
    </div>

    <h1 class="title" id="main-title">HUMAN FRUIT SLOT</h1>
    <div class="subtitle" id="sub-title">사람 슬롯과 함께 돌아가는 과일 슬롯머신!</div>

    <div class="slot-container">
        <div class="slot-window">
            <div class="slot-reel" id="slot-reel">
                </div>
        </div>
    </div>

    <button class="start-btn" id="start-btn">START!</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBN9D_2fzQe2rFpoWqhzHmtFZxcCKaUhok",
            authDomain: "slot-ee50a.firebaseapp.com",
            projectId: "slot-ee50a",
            storageBucket: "slot-ee50a.firebasestorage.app",
            messagingSenderId: "676721791908",
            appId: "1:676721791908:web:9964fd3646e60abe766731",
            measurementId: "G-4K8HW92DFE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const slotReel = document.getElementById('slot-reel');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('connection-status');
        const roomNameText = document.getElementById('room-name');
        
        const mainTitle = document.getElementById('main-title');
        const subTitle = document.getElementById('sub-title');
        const soundSpin = document.getElementById('sound-spin');
        const soundWin = document.getElementById('sound-win');

        const settingsBtn = document.getElementById('settings-btn');
        const settingsModal = document.getElementById('settings-modal');
        const saveBtn = document.getElementById('save-btn');
        const inputTitle = document.getElementById('input-title');
        const inputSubtitle = document.getElementById('input-subtitle');
        const inputDuration = document.getElementById('input-duration');
        const inputWinrate = document.getElementById('input-winrate');
        const inputSound = document.getElementById('input-sound');

        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room') || 'festival1';
        roomNameText.innerText = roomId;

        const fruits = ['🍎', '🍇', '🍌'];
        let isSpinning = false;
        let lastTriggerId = null;
        let lastShownResult = '❓'; // 화면 깜빡임 방지용 이전 결과
        
        let currentDuration = 4500; 
        let soundEnabled = true;    
        let currentWinRate = 60;

        // 🌟 최적화 1: 50개의 과일을 페이지 로딩 시 딱 한 번만 만듭니다!
        const totalItems = 50; 
        for(let i = 0; i < totalItems; i++) {
            const div = document.createElement('div');
            div.className = 'slot-item';
            div.innerText = (i === 0) ? lastShownResult : fruits[Math.floor(Math.random() * 3)];
            slotReel.appendChild(div);
        }
        // 만들어진 아이템들을 배열로 저장해두고 글씨만 바꿔치기 합니다.
        const reelItems = slotReel.querySelectorAll('.slot-item');

        const spinRef = ref(db, `rooms/${roomId}/spinTrigger`);
        const settingsRef = ref(db, `rooms/${roomId}/settings`);
        const connectedRef = ref(db, ".info/connected");
        
        // 🌟 최적화 2: 서버와 기기 간의 오차 시간을 구해 완벽한 동기화를 수행합니다.
        const offsetRef = ref(db, ".info/serverTimeOffset");
        let serverTimeOffset = 0;
        onValue(offsetRef, (snap) => {
            serverTimeOffset = snap.val() || 0;
        });
        
        // 내 노트북 시계가 아닌 '서버의 절대 시간'을 가져오는 함수
        const getServerTime = () => Date.now() + serverTimeOffset;

        onValue(connectedRef, (snap) => {
            statusText.innerText = snap.val() === true ? "연결됨🟢" : "끊김🔴";
        });

        settingsBtn.addEventListener('click', () => { settingsModal.classList.remove('hidden'); });

        saveBtn.addEventListener('click', () => {
            soundEnabled = inputSound.checked;
            const newSettings = {
                title: inputTitle.value,
                subtitle: inputSubtitle.value,
                duration: parseFloat(inputDuration.value) * 1000,
                winRate: parseInt(inputWinrate.value)
            };
            set(settingsRef, newSettings);
            settingsModal.classList.add('hidden');
        });

        onValue(settingsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                if (data.title !== undefined) { mainTitle.innerText = data.title; inputTitle.value = data.title; }
                if (data.subtitle !== undefined) { subTitle.innerText = data.subtitle; inputSubtitle.value = data.subtitle; }
                if (data.duration !== undefined) { currentDuration = data.duration; inputDuration.value = data.duration / 1000; }
                if (data.winRate !== undefined) { currentWinRate = data.winRate; inputWinrate.value = data.winRate; }
            }
        });

        // 시작 버튼 클릭 (서버로 신호 전송)
        startBtn.addEventListener('click', () => {
            if (isSpinning) return;
            startBtn.classList.add('pressed');
            setTimeout(() => startBtn.classList.remove('pressed'), 200);

            // 즉각적인 버튼 비활성화 (피드백)
            startBtn.disabled = true;

            let targetRate = currentWinRate / 100;
            if (targetRate < 0.34) targetRate = 0.34; 
            
            const pForce = (targetRate - (1/3)) / (2/3);
            const isForcedMatch = Math.random() < pForce;
            const forcedFruit = fruits[Math.floor(Math.random() * 3)];

            // 고유 아이디와 목표 종료 시간(서버시간 기준)을 전송
            const triggerId = Math.random().toString(36).substring(2, 10);
            const targetStopTime = getServerTime() + currentDuration;

            set(spinRef, {
                triggerId: triggerId,
                targetStopTime: targetStopTime,
                isForcedMatch: isForcedMatch,
                forcedFruit: forcedFruit
            }).catch(console.error);
        });

        // 🌟 최적화 3: 서버 신호 수신 및 애니메이션 보정 실행
        onValue(spinRef, (snapshot) => {
            const data = snapshot.val();
            if (!data || !data.triggerId || data.triggerId === lastTriggerId) return;
            
            lastTriggerId = data.triggerId;

            // 남은 시간을 정확하게 계산합니다 (목표 종료 시간 - 현재 서버 시간)
            const remainingDuration = data.targetStopTime - getServerTime();
            
            // 만약 네트워크가 너무 느려 이미 종료 시간이 지났다면 실행하지 않음
            if (remainingDuration <= 0) {
                startBtn.disabled = false;
                return; 
            }

            // 너무 비정상적으로 긴 시간이 남았다면(예외 상황) 기본 시간으로 처리
            let safeDuration = remainingDuration;
            if (safeDuration > currentDuration + 2000) safeDuration = currentDuration;

            startOptimizedSpinning(safeDuration, data);
        });

        // 🌟 극강의 최적화가 적용된 렌더링 함수
        function startOptimizedSpinning(duration, spinData) {
            isSpinning = true;
            startBtn.disabled = true;
            statusText.innerText = "도는중🌀";

            if (soundEnabled) {
                soundSpin.currentTime = 0;
                soundSpin.play().catch(e => console.log("자동재생 방지됨"));
            }

            // 1. 깜빡임 방지: 이전의 결과를 첫 번째 요소에 넣어 시각적 점프를 없앱니다.
            reelItems[0].innerText = lastShownResult;

            // 2. 글자(Text)만 아주 빠르게 무작위로 바꿉니다. (DOM 생성 삭제 없음!)
            for(let i = 1; i < totalItems - 1; i++) {
                reelItems[i].innerText = fruits[Math.floor(Math.random() * 3)];
            }

            // 3. 마지막 도착지점 (조작 또는 랜덤)
            let finalResult = fruits[Math.floor(Math.random() * 3)];
            if (spinData && spinData.isForcedMatch) {
                finalResult = spinData.forcedFruit;
            }
            reelItems[totalItems - 1].innerText = finalResult;
            lastShownResult = finalResult; // 다음번 시작을 위해 저장해둡니다.

            // 4. 애니메이션 시작 (무조건 마지막 아이템까지 스크롤)
            const itemHeight = 500; 
            const finalY = -(totalItems - 1) * itemHeight;

            const animation = slotReel.animate([
                { transform: 'translateY(0px)' },
                { transform: `translateY(${finalY}px)` }
            ], {
                duration: duration,
                easing: 'cubic-bezier(0.1, 0.9, 0.2, 1.0)', 
                fill: 'forwards'
            });

            animation.onfinish = () => {
                if (soundEnabled) {
                    soundWin.currentTime = 0;
                    soundWin.play().catch(e => console.log("자동재생 방지됨"));
                }
                
                fireConfetti();
                slotReel.parentElement.classList.add('shake-animation');
                setTimeout(() => slotReel.parentElement.classList.remove('shake-animation'), 400);

                isSpinning = false;
                startBtn.disabled = false;
                statusText.innerText = "연결됨🟢";
            };
        }

        // 축하 폭죽 효과
        function fireConfetti() {
            var duration = 2000;
            var end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff00ff', '#00ffff', '#ffff00'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff00ff', '#00ffff', '#ffff00'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
